name: Build and Push Docker Images

on:
  push:
    branches:
      - main

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      # Build User Service JAR
      - name: Build User Service
        run: |
          cd user-service
          mvn clean package

      # Build Product Service JAR
      - name: Build Product Service
        run: |
          cd product-service
          mvn clean package

      # Login Docker Hub
      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # User Service Image
      - name: Build User Docker Image
        run: |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/user-service:latest \
            ./user-service

      - name: Push User Docker Image
        run: |
          docker push \
            ${{ secrets.DOCKER_USERNAME }}/user-service:latest

      # Product Service Image
      - name: Build Product Docker Image
        run: |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/product-service:latest \
            ./product-service

      - name: Push Product Docker Image
        run: |
          docker push \
            ${{ secrets.DOCKER_USERNAME }}/product-service:latest